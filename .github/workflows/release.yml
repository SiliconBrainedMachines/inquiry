# Release workflow
#
# WORKAROUND: Windows Defender on the windows-2025 / windows-latest runner
# image (20260413.84.1+) quarantines dart.exe from the toolcache after
# `dart test` runs. Symptom: `dart pub get`, `dart analyze`, `dart test`
# succeed, but `dart compile exe` fails with "dart not recognized" even
# though $env:DART_HOME still points at a now-empty directory.
#
# Mitigation: before compiling, wipe the dart toolcache dir and the
# temp zip, then re-run dart-lang/setup-dart. Defender exclusions at the
# top of the job appear not to take effect on hosted runners but are kept
# as a defense-in-depth hint.
#
# If this workaround is removed, the release build will fail in ways
# that look (but are not) like PATH issues.

name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'code/cli/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: code/cli

    steps:
      - uses: actions/checkout@v4

      - name: Exclude toolcache from Windows Defender
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\hostedtoolcache" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "D:\a" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "dart.exe" -ErrorAction SilentlyContinue
          # Clean a possibly-empty cached dart dir so setup-dart re-downloads
          $dartCache = "C:\hostedtoolcache\windows\dart"
          if (Test-Path $dartCache) {
            Remove-Item -Recurse -Force $dartCache
          }

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.8.1'

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Read version from pubspec.yaml
        id: version
        run: |
          $v = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value.Trim()
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"
        shell: pwsh

      - name: Create build directories
        run: New-Item -ItemType Directory -Force -Path build\bin | Out-Null

      # Defender removes dart.exe after tests run. Wipe caches so the
      # next setup-dart step downloads a fresh SDK instead of reusing
      # the corrupted (empty) cached dir.
      - name: Clean dart cache to force re-download
        shell: pwsh
        run: |
          $dartCache = "C:\hostedtoolcache\windows\dart"
          if (Test-Path $dartCache) {
            Write-Host "Removing $dartCache"
            Remove-Item -Recurse -Force $dartCache
          }
          $dartZip = "D:\a\_temp\dartsdk-windows-x64-release.zip"
          if (Test-Path $dartZip) {
            Write-Host "Removing $dartZip"
            Remove-Item -Force $dartZip
          }

      - name: Re-setup Dart (ensure SDK present before compile)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.8.1'

      - name: Compile
        run: dart compile exe bin/main.dart -o build\bin\ape.exe

      - name: Copy assets
        run: Copy-Item -Recurse assets build\assets

      - name: Package
        run: Compress-Archive -Path build\* -DestinationPath ape-windows-x64.zip

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: code/cli/ape-windows-x64.zip
          generate_release_notes: true
          make_latest: true
